display_information:
  name: ghostship
  description: A bot built with Chat SDK
  background_color: "#1a1a2e"
features:
  bot_user:
    display_name: ghostship
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - chat:write
      - reactions:write
      - users:read
  pkce_enabled: false
settings:
  event_subscriptions:
    request_url: https://1c92-12-94-170-82.ngrok-free.app/api/webhooks/slack
    bot_events:
      - app_mention
      - member_joined_channel
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
    request_url: https://1c92-12-94-170-82.ngrok-free.app/api/webhooks/slack
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
